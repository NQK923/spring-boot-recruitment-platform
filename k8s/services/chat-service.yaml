apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-service
  namespace: recruitment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chat-service
  template:
    metadata:
      labels:
        app: chat-service
    spec:
      containers:
        - name: chat-service
          image: asia-southeast1-docker.pkg.dev/glass-respect-478307-a3/nqk/chat-service:v1
          imagePullPolicy: IfNotPresent
          env:
            - name: EUREKA_INSTANCE_PREFER_IP_ADDRESS
              value: "true"
            - name: SERVER_PORT
              value: "8080"
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              valueFrom:
                configMapKeyRef:
                  name: recruitment-config
                  key: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
            - name: APP_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: recruitment-secrets
                  key: APP_JWT_SECRET
            - name: FRONTEND_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: recruitment-config
                  key: FRONTEND_BASE_URL
            - name: SUPABASE_HOST
              valueFrom:
                secretKeyRef:
                  name: recruitment-secrets
                  key: SUPABASE_HOST
            - name: SUPABASE_PORT
              valueFrom:
                secretKeyRef:
                  name: recruitment-secrets
                  key: SUPABASE_PORT
            - name: SUPABASE_DB
              valueFrom:
                secretKeyRef:
                  name: recruitment-secrets
                  key: SUPABASE_DB
            - name: SUPABASE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: recruitment-secrets
                  key: SUPABASE_USERNAME
            - name: SUPABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: recruitment-secrets
                  key: SUPABASE_PASSWORD
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: recruitment-secrets
                  key: GEMINI_API_KEY
            - name: GEMINI_MODEL
              valueFrom:
                secretKeyRef:
                  name: recruitment-secrets
                  key: GEMINI_MODEL
            - name: GEMINI_BASE
              valueFrom:
                secretKeyRef:
                  name: recruitment-secrets
                  key: GEMINI_BASE
            - name: GEMINI_TEMPERATURE
              valueFrom:
                secretKeyRef:
                  name: recruitment-secrets
                  key: GEMINI_TEMPERATURE
            - name: GEMINI_TOP_P
              valueFrom:
                secretKeyRef:
                  name: recruitment-secrets
                  key: GEMINI_TOP_P
            - name: GEMINI_MAX_TOKENS
              valueFrom:
                secretKeyRef:
                  name: recruitment-secrets
                  key: GEMINI_MAX_TOKENS
            - name: COMPANY_NAME
              valueFrom:
                secretKeyRef:
                  name: recruitment-secrets
                  key: COMPANY_NAME
            - name: CAREERS_URL
              valueFrom:
                secretKeyRef:
                  name: recruitment-secrets
                  key: CAREERS_URL
            - name: CANDIDATE_PORTAL_URL
              valueFrom:
                secretKeyRef:
                  name: recruitment-secrets
                  key: CANDIDATE_PORTAL_URL
            - name: POLICY_URL
              valueFrom:
                secretKeyRef:
                  name: recruitment-secrets
                  key: POLICY_URL
            - name: PRIVACY_URL
              valueFrom:
                secretKeyRef:
                  name: recruitment-secrets
                  key: PRIVACY_URL
            - name: PUBLIC_HR_MAILBOX
              valueFrom:
                secretKeyRef:
                  name: recruitment-secrets
                  key: PUBLIC_HR_MAILBOX
            - name: CHAT_REQUESTS_PER_MINUTE
              valueFrom:
                secretKeyRef:
                  name: recruitment-secrets
                  key: CHAT_REQUESTS_PER_MINUTE
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "300m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: chat-service
  namespace: recruitment
spec:
  selector:
    app: chat-service
  ports:
    - port: 8080
      targetPort: 8080
