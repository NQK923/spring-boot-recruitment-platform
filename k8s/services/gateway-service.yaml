apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: recruitment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
    spec:
      containers:
        - name: gateway-service
          image: asia-southeast1-docker.pkg.dev/glass-respect-478307-a3/nqk/gateway-service:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              valueFrom:
                configMapKeyRef:
                  name: recruitment-config
                  key: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
            - name: APP_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: recruitment-secrets
                  key: APP_JWT_SECRET
            - name: SERVER_PORT
              value: "8080"
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: recruitment
spec:
  selector:
    app: gateway-service
  ports:
    - port: 8080
      targetPort: 8080
