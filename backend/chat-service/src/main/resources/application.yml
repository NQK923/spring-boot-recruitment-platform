server:
  port: 0 # Random port để thuận tiện chạy nhiều service

spring:
  application:
    name: CHAT-SERVICE
  main:
    web-application-type: reactive
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${SUPABASE_HOST:aws-1-ap-southeast-1.pooler.supabase.com}:${SUPABASE_PORT:5432}/${SUPABASE_DB:postgres}?currentSchema=rec_db&sslmode=require}
    username: ${SPRING_DATASOURCE_USERNAME:${SUPABASE_USERNAME:postgres.npynwsukvsxrsmxssikx}}
    password: ${SPRING_DATASOURCE_PASSWORD:${SUPABASE_PASSWORD:}}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${CHAT_HIKARI_MAX_POOL_SIZE:3}
      minimum-idle: ${CHAT_HIKARI_MIN_IDLE:1}
      connection-init-sql: >
        CREATE SCHEMA IF NOT EXISTS rec_db;
        SET search_path TO rec_db, public, extensions;
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true
    default-schema: rec_db
    liquibase-schema: rec_db
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/api/auth
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.SecurityFilterAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

app:
  jwt:
    secret: ${APP_JWT_SECRET:}
  chat:
    rate-limit:
      requests-per-minute: ${CHAT_REQUESTS_PER_MINUTE:5}
  recommend:
    topK: ${CHAT_RECOMMEND_TOP_K:50}
    finalK: ${CHAT_RECOMMEND_FINAL_K:5}
    freshnessDays: ${CHAT_RECOMMEND_FRESHNESS_DAYS:21}
    bootstrapSize: ${CHAT_RECOMMEND_BOOTSTRAP_SIZE:50}
    jobDetailBaseUrl: ${CHAT_JOB_DETAIL_BASE_URL:http://localhost:3000/jobs}
  gateway:
    base-url: ${GATEWAY_BASE_URL:http://gateway-service:8080}

services:
  gateway-base-url: ${GATEWAY_BASE_URL:http://gateway-service:8080}

gemini:
  api-key: ${GEMINI_API_KEY:}
  model: ${GEMINI_MODEL:gemini-2.5-flash-lite}
  embedding-model: ${GEMINI_EMBEDDING_MODEL:text-embedding-004}
  base-url: ${GEMINI_BASE:https://generativelanguage.googleapis.com/v1beta}
  temperature: ${GEMINI_TEMPERATURE:0.3}
  top-p: ${GEMINI_TOP_P:0.9}
  max-tokens: ${GEMINI_MAX_TOKENS:400}
  system-prompt-path: classpath:prompts/system.txt
  company-name: ${COMPANY_NAME:}
  careers-url: ${CAREERS_URL:}
  candidate-portal-url: ${CANDIDATE_PORTAL_URL:}
  policy-url: ${POLICY_URL:}
  privacy-url: ${PRIVACY_URL:}
  public-hr-mailbox: ${PUBLIC_HR_MAILBOX:}
