server:
  port: 0

spring:
  application:
    name: chat-service
  main:
    web-application-type: reactive
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.SecurityFilterAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

app:
  jwt:
    secret: ${APP_JWT_SECRET:}
  chat:
    rate-limit:
      requests-per-minute: ${CHAT_REQUESTS_PER_MINUTE:10}

gemini:
  api-key: ${GEMINI_API_KEY:}
  model: ${GEMINI_MODEL:gemini-2.5-flash-lite}
  base-url: ${GEMINI_BASE:https://generativelanguage.googleapis.com/v1beta}
  temperature: ${GEMINI_TEMPERATURE:0.3}
  top-p: ${GEMINI_TOP_P:0.9}
  max-tokens: ${GEMINI_MAX_TOKENS:}
  system-prompt-path: classpath:prompts/system.txt
  company-name: ${COMPANY_NAME:}
  careers-url: ${CAREERS_URL:}
  candidate-portal-url: ${CANDIDATE_PORTAL_URL:}
  policy-url: ${POLICY_URL:}
  privacy-url: ${PRIVACY_URL:}
  public-hr-mailbox: ${PUBLIC_HR_MAILBOX:}
