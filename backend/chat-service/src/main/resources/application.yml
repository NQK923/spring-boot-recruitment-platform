server:
  port: 0

spring:
  application:
    name: chat-service
  main:
    web-application-type: reactive
  datasource:
    url: ${CHAT_DB_URL:jdbc:postgresql://db.supabase.co:5432/postgres?currentSchema=rec_db}
    username: ${CHAT_DB_USERNAME:postgres}
    password: ${CHAT_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
  ai:
    openai:
      api-key: ${SPRING_AI_OPENAI_API_KEY:}
      embedding:
        options:
          model: ${SPRING_AI_EMBEDDING_MODEL:text-embedding-3-small}
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.SecurityFilterAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

app:
  jwt:
    secret: ${APP_JWT_SECRET:}
  chat:
    rate-limit:
      requests-per-minute: ${CHAT_REQUESTS_PER_MINUTE:10}
  recommend:
    topK: ${CHAT_RECOMMEND_TOP_K:50}
    finalK: ${CHAT_RECOMMEND_FINAL_K:5}
    freshnessDays: ${CHAT_RECOMMEND_FRESHNESS_DAYS:21}
services:
  gateway-base-url: ${GATEWAY_BASE_URL:http://gateway-service:8080}

gemini:
  api-key: ${GEMINI_API_KEY:}
  model: ${GEMINI_MODEL:gemini-2.5-flash-lite}
  base-url: ${GEMINI_BASE:https://generativelanguage.googleapis.com/v1beta}
  temperature: ${GEMINI_TEMPERATURE:0.3}
  top-p: ${GEMINI_TOP_P:0.9}
  max-tokens: ${GEMINI_MAX_TOKENS:}
  system-prompt-path: classpath:prompts/system.txt
  company-name: ${COMPANY_NAME:}
  careers-url: ${CAREERS_URL:}
  candidate-portal-url: ${CANDIDATE_PORTAL_URL:}
  policy-url: ${POLICY_URL:}
  privacy-url: ${PRIVACY_URL:}
  public-hr-mailbox: ${PUBLIC_HR_MAILBOX:}
