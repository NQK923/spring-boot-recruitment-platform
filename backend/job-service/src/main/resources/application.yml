server:
  port: 0 # Random port

spring:
  application:
    name: JOB-SERVICE
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${SUPABASE_HOST:aws-1-ap-southeast-1.pooler.supabase.com}:${SUPABASE_PORT:5432}/${SUPABASE_DB:postgres}?currentSchema=job_db&sslmode=require}
    username: ${SPRING_DATASOURCE_USERNAME:${SUPABASE_USERNAME:postgres.npynwsukvsxrsmxssikx}}
    password: ${SPRING_DATASOURCE_PASSWORD:${SUPABASE_PASSWORD:}}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${JOB_HIKARI_MAX_POOL_SIZE:3}
      minimum-idle: ${JOB_HIKARI_MIN_IDLE:1}
      connection-init-sql: >
        CREATE SCHEMA IF NOT EXISTS job_db;
        SET search_path TO job_db;
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: job_db
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true
    default-schema: job_db
    liquibase-schema: job_db
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
  security:
    oauth2:
      resourceserver:
        jwt:
          # This should point to the JWK Set URI of your auth server
          # For simplicity with shared secret, we configure it in code
          issuer-uri: http://localhost:8080/api/auth # A placeholder, not used with shared secret

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

app:
  jwt:
    secret: ${APP_JWT_SECRET:}
  gateway:
    base-url: http://gateway-service:8080
