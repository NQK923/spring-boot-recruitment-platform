server:
  port: 0 # Assign a random port

spring:
  application:
    name: COMPANY-SERVICE
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${SUPABASE_HOST:aws-1-ap-southeast-1.pooler.supabase.com}:${SUPABASE_PORT:5432}/${SUPABASE_DB:postgres}?currentSchema=company_db&sslmode=require}
    username: ${SPRING_DATASOURCE_USERNAME:${SUPABASE_USERNAME:postgres.npynwsukvsxrsmxssikx}}
    password: ${SPRING_DATASOURCE_PASSWORD:${SUPABASE_PASSWORD:}}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${COMPANY_HIKARI_MAX_POOL_SIZE:3}
      minimum-idle: ${COMPANY_HIKARI_MIN_IDLE:1}
      connection-init-sql: >
        CREATE SCHEMA IF NOT EXISTS company_db;
        SET search_path TO company_db;
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        default_schema: company_db

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true
    default-schema: company_db
    liquibase-schema: company_db
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: "http://localhost:8080/api/auth/token_keys" # This is a placeholder, we will use a shared secret for now

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

app:
  jwt:
    secret: ${APP_JWT_SECRET:}
