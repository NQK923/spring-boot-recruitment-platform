server:
  port: 0 # Assign a random port

spring:
  application:
    name: COMPANY-SERVICE
  datasource:
    url: jdbc:postgresql://${SUPABASE_HOST:localhost}:${SUPABASE_PORT:5432}/${SUPABASE_DB:postgres}?sslmode=require
    username: ${SUPABASE_USERNAME:postgres}
    password: ${SUPABASE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-init-sql: >
        CREATE SCHEMA IF NOT EXISTS company_db;
        SET search_path TO company_db;
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        default_schema: company_db

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true
    default-schema: company_db
    liquibase-schema: company_db
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: "http://localhost:8080/api/auth/token_keys" # This is a placeholder, we will use a shared secret for now

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

app:
  jwt:
    secret: ${APP_JWT_SECRET:}
