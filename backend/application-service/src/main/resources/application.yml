server:
  port: 0 # Random port

spring:
  application:
    name: APPLICATION-SERVICE
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://db.assfzyuoglllaqwvcetg.supabase.co:5432/postgres?currentSchema=application_db&sslmode=require}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-init-sql: CREATE SCHEMA IF NOT EXISTS application_db;


  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true
    default-schema: application_db
    liquibase-schema: application_db

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: application_db
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  cloud:
    stream:
      defaultBinder: rabbit
      binders:
        rabbit:
          type: rabbit
      bindings:
        applicationStatusChanged-out-0:
          binder: rabbit
          destination: application.status.changed


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

