server:
  port: 0 # Random port

spring:
  application:
    name: APPLICATION-SERVICE
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${SUPABASE_HOST:aws-1-ap-southeast-1.pooler.supabase.com}:${SUPABASE_PORT:5432}/${SUPABASE_DB:postgres}?currentSchema=application_db&sslmode=require}
    username: ${SPRING_DATASOURCE_USERNAME:${SUPABASE_USERNAME:postgres.npynwsukvsxrsmxssikx}}
    password: ${SPRING_DATASOURCE_PASSWORD:${SUPABASE_PASSWORD:}}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${APPLICATION_HIKARI_MAX_POOL_SIZE:3}
      minimum-idle: ${APPLICATION_HIKARI_MIN_IDLE:1}
      connection-init-sql: >
        CREATE SCHEMA IF NOT EXISTS application_db;
        SET search_path TO application_db;


  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true
    default-schema: application_db
    liquibase-schema: application_db

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: application_db
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}

  cloud:
    stream:
      defaultBinder: rabbit
      binders:
        rabbit:
          type: rabbit
      bindings:
        applicationStatusChanged-out-0:
          binder: rabbit
          destination: application.status.changed


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

app:
  jwt:
    secret: ${APP_JWT_SECRET:}

security:
  oauth2:
    resourceserver:
      jwt:
        # IMPORTANT: Uncomment and provide a valid issuer-uri or jwk-set-uri
        # issuer-uri: http://localhost:8080/api/auth # Placeholder
        # jwk-set-uri: http://localhost:8080/api/auth/jwks
