server:
  port: 0 # Assign a random port

spring:
  application:
    name: AUTH-SERVICE
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: khanh090203
    hikari:
      connectionInitSql: CREATE SCHEMA IF NOT EXISTS auth_service
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate.default_schema: auth_service

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true
    default-schema: auth_service
    liquibase-schema: public
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
  cloud:
    stream:
      bindings:
        # This defines an output channel named 'userInvited-out-0'
        userInvited-out-0:
          destination: user.events # It will send to this queue/topic
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: "# PASTE_YOUR_GOOGLE_CLIENT_ID_HERE"
            client-secret: "# PASTE_YOUR_GOOGLE_CLIENT_SECRET_HERE"
            scope:
              - email
              - profile
          github:
            client-id: "# PASTE_YOUR_GITHUB_CLIENT_ID_HERE"
            client-secret: "# PASTE_YOUR_GITHUB_CLIENT_SECRET_HERE"
            scope:
              - user:email

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

app:
  jwt:
    secret: "# IMPORTANT: Change this to a long, random, base64-encoded string"
    expiration-ms: 86400000 # 24 hours