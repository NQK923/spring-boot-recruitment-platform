server:
  port: 0 # Assign a random port

spring:
  application:
    name: AUTH-SERVICE
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${SUPABASE_HOST:aws-1-ap-southeast-1.pooler.supabase.com}:${SUPABASE_PORT:5432}/${SUPABASE_DB:postgres}?currentSchema=auth_db&sslmode=require}
    username: ${SPRING_DATASOURCE_USERNAME:${SUPABASE_USERNAME:postgres.npynwsukvsxrsmxssikx}}
    password: ${SPRING_DATASOURCE_PASSWORD:${SUPABASE_PASSWORD:}}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${AUTH_HIKARI_MAX_POOL_SIZE:3}
      minimum-idle: ${AUTH_HIKARI_MIN_IDLE:1}
      connection-init-sql: >
        CREATE SCHEMA IF NOT EXISTS auth_db;
        SET search_path TO auth_db;
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: auth_db
    show-sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true
    default-schema: auth_db
    liquibase-schema: auth_db

  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}

  cloud:
    stream:
      defaultBinder: rabbit
      binders:
        rabbit:
          type: rabbit
      bindings:
        # This defines an output channel named 'userInvited-out-0'
        userInvited-out-0:
          binder: rabbit
          destination: user.invited
        userRegistered-out-0:
          binder: rabbit
          destination: user.registered
        passwordResetRequested-out-0:
          binder: rabbit
          destination: password.reset.requested
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope:
              - email
              - profile
          github:
            client-id: ${GITHUB_CLIENT_ID:}
            client-secret: ${GITHUB_CLIENT_SECRET:}
            scope:
              - user:email

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

app:
  jwt:
    secret: ${APP_JWT_SECRET:}
    expiration-ms: 86400000 # 24 hours
  clients:
    gateway-base-url: ${GATEWAY_BASE_URL:http://localhost:8080}
  oauth:
    github:
      redirect-uri: ${GITHUB_REDIRECT_URI:recruitment-platform://auth/callback}
      authorize-redirect-uri: ${GITHUB_AUTHORIZE_REDIRECT_URI:http://localhost:8080/api/auth/oauth/github/callback}
