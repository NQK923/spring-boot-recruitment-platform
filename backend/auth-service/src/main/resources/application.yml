server:
  port: 0 # Assign a random port

spring:
  application:
    name: AUTH-SERVICE
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://db.assfzyuoglllaqwvcetg.supabase.co:5432/postgres?currentSchema=auth_db&sslmode=require}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-init-sql: CREATE SCHEMA IF NOT EXISTS auth_db;
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: auth_db
    show-sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true
    default-schema: auth_db
    liquibase-schema: auth_db

  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  cloud:
    stream:
      defaultBinder: rabbit
      binders:
        rabbit:
          type: rabbit
      bindings:
        # This defines an output channel named 'userInvited-out-0'
        userInvited-out-0:
          binder: rabbit
          destination: user.invited
        userRegistered-out-0:
          binder: rabbit
          destination: user.registered
        passwordResetRequested-out-0:
          binder: rabbit
          destination: password.reset.requested
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope:
              - email
              - profile
          github:
            client-id: ${GITHUB_CLIENT_ID:}
            client-secret: ${GITHUB_CLIENT_SECRET:}
            scope:
              - user:email

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

app:
  jwt:
    secret: "7zZFJQIluiTVIZLWJzzEB8Qsd2oWWMCTlvp5WWMffStMaX-Biw04q3pox8z2Fx4BYSQr4MPRZejC-OAj2rsZHg"
    expiration-ms: 86400000 # 24 hours
  clients:
    gateway-base-url: ${GATEWAY_BASE_URL:http://localhost:8080}
  oauth:
    github:
      redirect-uri: ${GITHUB_REDIRECT_URI:recruitment-platform://auth/callback}
      authorize-redirect-uri: ${GITHUB_AUTHORIZE_REDIRECT_URI:http://localhost:8080/api/auth/oauth/github/callback}
