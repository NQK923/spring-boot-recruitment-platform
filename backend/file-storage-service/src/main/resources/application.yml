server:
  port: 0 # Random port

spring:
  application:
    name: FILE-STORAGE-SERVICE
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: jdbc:postgresql://${SUPABASE_HOST:localhost}:${SUPABASE_PORT:5432}/${SUPABASE_DB:postgres}?sslmode=require
    username: ${SUPABASE_USERNAME:postgres}
    password: ${SUPABASE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-init-sql: >
        CREATE SCHEMA IF NOT EXISTS file_storage_db;
        SET search_path TO file_storage_db;
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: file_storage_db
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true
    default-schema: file_storage_db
    liquibase-schema: file_storage_db
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/api/auth # Placeholder

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

app:
  jwt:
    secret: ${APP_JWT_SECRET:}
  storage:
    upload-dir: "C:/recruitment-uploads" # <-- IMPORTANT: Create this directory and ensure it's writable
