server:
  port: 0 # Random port

spring:
  application:
    name: FILE-STORAGE-SERVICE
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${SUPABASE_HOST:aws-1-ap-southeast-1.pooler.supabase.com}:${SUPABASE_PORT:5432}/${SUPABASE_DB:postgres}?currentSchema=file_storage_db&sslmode=require}
    username: ${SPRING_DATASOURCE_USERNAME:${SUPABASE_USERNAME:postgres.npynwsukvsxrsmxssikx}}
    password: ${SPRING_DATASOURCE_PASSWORD:${SUPABASE_PASSWORD:}}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${FILE_STORAGE_HIKARI_MAX_POOL_SIZE:3}
      minimum-idle: ${FILE_STORAGE_HIKARI_MIN_IDLE:1}
      connection-init-sql: >
        CREATE SCHEMA IF NOT EXISTS file_storage_db;
        SET search_path TO file_storage_db;
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: file_storage_db
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true
    default-schema: file_storage_db
    liquibase-schema: file_storage_db
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/api/auth # Placeholder

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

app:
  jwt:
    secret: ${APP_JWT_SECRET:}

supabase:
  project-url: ${SUPABASE_PROJECT_URL:https://npynwsukvsxrsmxssikx.supabase.co}
  service-role-key: ${SUPABASE_SERVICE_ROLE_KEY:}
  storage:
    avatar-bucket: ${SUPABASE_AVATAR_BUCKET:avatars}
    cv-bucket: ${SUPABASE_CV_BUCKET:cvs}
    signed-url-expiry-seconds: ${SUPABASE_STORAGE_SIGNED_URL_TTL:600}
