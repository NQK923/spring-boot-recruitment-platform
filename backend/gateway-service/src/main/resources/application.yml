server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/api/auth/**
        - id: company-service
          uri: lb://COMPANY-SERVICE
          predicates:
            - Path=/api/companies/**
        - id: job-service
          uri: lb://JOB-SERVICE
          predicates:
            - Path=/api/jobs/**
        - id: user-profile-service
          uri: lb://USER-PROFILE-SERVICE
          predicates:
            - Path=/api/profiles/**
        - id: application-service
          uri: lb://APPLICATION-SERVICE
          predicates:
            - Path=/api/applications/**
        - id: interview-service
          uri: lb://INTERVIEW-SERVICE
          predicates:
            - Path=/api/interviews/**
        # Internal routes - exposed for service-to-service communication via gateway
        - id: user-profile-internal-batch
          uri: lb://USER-PROFILE-SERVICE
          predicates:
            - Path=/api/internal/profiles/batch
        - id: auth-internal-invites
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/api/internal/auth/invites
        - id: auth-internal-users-batch
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/api/internal/auth/users/batch
        - id: company-internal-users
          uri: lb://COMPANY-SERVICE
          predicates:
            - Path=/api/internal/companies/users
        - id: company-internal-users-company
          uri: lb://COMPANY-SERVICE
          predicates:
            - Path=/api/internal/companies/users/{userId}/company
        - id: files-upload # Route for file uploads
          uri: lb://FILE-STORAGE-SERVICE
          predicates:
            - Path=/api/files/upload
      server:
        webflux:
          discovery:
            locator:
              enabled: false
          globalcors:
            cors-configurations:
              '[/**]':
                          allowedOrigins: "*"
                          allowedMethods: "*"
                          allowedHeaders: "*"

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

app:
  jwt:
    secret: "# IMPORTANT: Must be the same as in auth-service"
