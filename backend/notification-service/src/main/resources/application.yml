server:
  port: 0 # Random port

spring:
  application:
    name: NOTIFICATION-SERVICE
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
  cloud:
    stream:
      defaultBinder: rabbit
      function:
        definition: userInvitedEventConsumer;userRegisteredEventConsumer;passwordResetRequestedEventConsumer;applicationStatusChangedEventConsumer;interviewScheduledEventConsumer;interviewRescheduledEventConsumer
      binders:
        rabbit:
          type: rabbit
      bindings:
        # This defines an input channel named 'userInvitedEventConsumer-in-0'
        userInvitedEventConsumer-in-0:
          binder: rabbit
          destination: user.invited
        userRegisteredEventConsumer-in-0:
          binder: rabbit
          destination: user.registered
        passwordResetRequestedEventConsumer-in-0:
          binder: rabbit
          destination: password.reset.requested
        applicationStatusChangedEventConsumer-in-0:
          binder: rabbit
          destination: application.status.changed
        interviewScheduledEventConsumer-in-0:
          binder: rabbit
          destination: interview.scheduled
        interviewRescheduledEventConsumer-in-0:
          binder: rabbit
          destination: interview.rescheduled
  mail:
    host: smtp.example.com # <-- IMPORTANT: Change this
    port: 587
    username: your-email@example.com # <-- IMPORTANT: Change this
    password: your-email-password # <-- IMPORTANT: Change this
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

