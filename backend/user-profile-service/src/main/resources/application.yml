server:
  port: 0 # Random port

spring:
  application:
    name: USER-PROFILE-SERVICE
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${SUPABASE_HOST:aws-1-ap-southeast-1.pooler.supabase.com}:${SUPABASE_PORT:5432}/${SUPABASE_DB:postgres}?currentSchema=user_profile_db&sslmode=require}
    username: ${SPRING_DATASOURCE_USERNAME:${SUPABASE_USERNAME:postgres.npynwsukvsxrsmxssikx}}
    password: ${SPRING_DATASOURCE_PASSWORD:${SUPABASE_PASSWORD:}}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${USER_PROFILE_HIKARI_MAX_POOL_SIZE:3}
      minimum-idle: ${USER_PROFILE_HIKARI_MIN_IDLE:1}
      connection-init-sql: >
        CREATE SCHEMA IF NOT EXISTS user_profile_db;
        SET search_path TO user_profile_db;
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: user_profile_db
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true
    default-schema: user_profile_db
    liquibase-schema: user_profile_db
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/api/auth # Placeholder
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}
  cloud:
    stream:
      defaultBinder: rabbit
      function:
        definition: userRegisteredEventConsumer
      binders:
        rabbit:
          type: rabbit
      bindings:
        userRegisteredEventConsumer-in-0:
          binder: rabbit
          destination: user.registered

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

app:
  jwt:
    secret: ${APP_JWT_SECRET:}

gemini:
  api-key: ${GEMINI_API_KEY:}
  model: ${GEMINI_MODEL:gemini-1.5-pro}
  base-url: ${GEMINI_BASE:https://generativelanguage.googleapis.com/v1beta}
  temperature: 0.7
  top-k: 40
  top-p: 0.9
  prompt-version: v1

cv:
  default:
    template: modern-1
    language: vi
    tone: neutral
  pdf:
    font-path: ${CV_FONT_PATH:/fonts/NotoSans-Regular.ttf}

