server:
  port: 0 # Random port

spring:
  application:
    name: INTERVIEW-SERVICE
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://db.assfzyuoglllaqwvcetg.supabase.co:5432/postgres?currentSchema=interview_db&sslmode=require}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-init-sql: CREATE SCHEMA IF NOT EXISTS interview_db;
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: interview_db
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true
    default-schema: interview_db
    liquibase-schema: interview_db
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/api/auth # Placeholder
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
  cloud:
    stream:
      defaultBinder: rabbit
      binders:
        rabbit:
          type: rabbit
      bindings:
        interviewScheduled-out-0:
          binder: rabbit
          destination: interview.scheduled
        interviewRescheduled-out-0:
          binder: rabbit
          destination: interview.rescheduled

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

app:
