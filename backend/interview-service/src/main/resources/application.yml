server:
  port: 0 # Random port

spring:
  application:
    name: INTERVIEW-SERVICE
  datasource:
    url: jdbc:postgresql://${SUPABASE_HOST:localhost}:${SUPABASE_PORT:5432}/${SUPABASE_DB:postgres}?sslmode=require
    username: ${SUPABASE_USERNAME:postgres}
    password: ${SUPABASE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-init-sql: >
        CREATE SCHEMA IF NOT EXISTS interview_db;
        SET search_path TO interview_db;
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: interview_db
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true
    default-schema: interview_db
    liquibase-schema: interview_db
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/api/auth # Placeholder
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}
  cloud:
    stream:
      defaultBinder: rabbit
      binders:
        rabbit:
          type: rabbit
      bindings:
        interviewScheduled-out-0:
          binder: rabbit
          destination: interview.scheduled
        interviewRescheduled-out-0:
          binder: rabbit
          destination: interview.rescheduled

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

app:
  jwt:
    secret: ${APP_JWT_SECRET:}
