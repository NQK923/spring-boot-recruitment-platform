server:
  port: 0 # Assign a random port

spring:
  application:
    name: COMPANY-SERVICE
  datasource:
    url: jdbc:postgresql://localhost:5432/company_db # <-- IMPORTANT: Change this
    username: your-username # <-- IMPORTANT: Change this
    password: your-password # <-- IMPORTANT: Change this
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: "http://localhost:8080/api/auth/token_keys" # This is a placeholder, we will use a shared secret for now

app:
  jwt:
    secret: "# IMPORTANT: Change this to a long, random, base64-encoded string" # Must be the same as in auth-service
