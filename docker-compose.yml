version: '3.8'

services:
  # Infrastructure Services
  postgres:
    image: postgres:15-alpine
    container_name: postgres_db
    environment:
      - POSTGRES_USER=your-username
      - POSTGRES_PASSWORD=your-password
      # Create databases for each service
      - POSTGRES_MULTIPLE_DATABASES=auth_db,company_db,user_profile_db,job_db,application_db,interview_db,file_storage_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Script to create multiple databases
      - ./docker-entrypoint-initdb.d/create-multiple-databases.sh:/docker-entrypoint-initdb.d/create-multiple-databases.sh
    networks:
      - recruitment-net

  rabbitmq:
    image: rabbitmq:3.11-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672" # AMQP port
      - "15672:15672" # Management UI
    networks:
      - recruitment-net

  # Application Services
  discovery-service:
    build:
      context: .
      dockerfile: backend/discovery-service/Dockerfile
    container_name: discovery-service
    ports:
      - "8761:8761"
    networks:
      - recruitment-net

  gateway-service:
    build:
      context: .
      dockerfile: backend/gateway-service/Dockerfile
    container_name: gateway-service
    ports:
      - "8080:8080"
    depends_on:
      - discovery-service
      - auth-service # Depends on auth for JWT keys
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - APP_JWT_SECRET=${APP_JWT_SECRET} # Pass secret from .env file
    networks:
      - recruitment-net

  auth-service:
    build:
      context: .
      dockerfile: backend/auth-service/Dockerfile
    container_name: auth-service
    depends_on:
      - discovery-service
      - postgres
      - rabbitmq
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/auth_db
      - SPRING_RABBITMQ_HOST=rabbitmq
      - APP_JWT_SECRET=${APP_JWT_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
    networks:
      - recruitment-net

  # Define other microservices similarly...
  company-service:
    build: { context: ., dockerfile: backend/company-service/Dockerfile }
    container_name: company-service
    depends_on: [discovery-service, postgres]
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/company_db
      - APP_JWT_SECRET=${APP_JWT_SECRET}
    networks: [recruitment-net]

  user-profile-service:
    build: { context: ., dockerfile: backend/user-profile-service/Dockerfile }
    container_name: user-profile-service
    depends_on: [discovery-service, postgres]
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/user_profile_db
      - APP_JWT_SECRET=${APP_JWT_SECRET}
    networks: [recruitment-net]

  job-service:
    build: { context: ., dockerfile: backend/job-service/Dockerfile }
    container_name: job-service
    depends_on: [discovery-service, postgres]
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/job_db
      - APP_JWT_SECRET=${APP_JWT_SECRET}
    networks: [recruitment-net]

  application-service:
    build: { context: ., dockerfile: backend/application-service/Dockerfile }
    container_name: application-service
    depends_on: [discovery-service, postgres, rabbitmq]
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/application_db
      - SPRING_RABBITMQ_HOST=rabbitmq
      - APP_JWT_SECRET=${APP_JWT_SECRET}
    networks: [recruitment-net]

  interview-service:
    build: { context: ., dockerfile: backend/interview-service/Dockerfile }
    container_name: interview-service
    depends_on: [discovery-service, postgres, rabbitmq]
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/interview_db
      - SPRING_RABBITMQ_HOST=rabbitmq
      - APP_JWT_SECRET=${APP_JWT_SECRET}
    networks: [recruitment-net]

  notification-service:
    build: { context: ., dockerfile: backend/notification-service/Dockerfile }
    container_name: notification-service
    depends_on: [discovery-service, rabbitmq]
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_RABBITMQ_HOST=rabbitmq
    networks: [recruitment-net]

  file-storage-service:
    build: { context: ., dockerfile: backend/file-storage-service/Dockerfile }
    container_name: file-storage-service
    depends_on: [discovery-service, postgres]
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/file_storage_db
      - APP_JWT_SECRET=${APP_JWT_SECRET}
      - APP_STORAGE_UPLOAD-DIR=/uploads # Use a path inside the container
    volumes:
      - file_storage_data:/uploads
    networks: [recruitment-net]

volumes:
  postgres_data:
  file_storage_data:

networks:
  recruitment-net:
    driver: bridge
