version: "3.9"
services:
  rabbitmq:
    image: rabbitmq:latest
    container_name: rabbitmq
    ports:
      - "5672:5672" # AMQP port
      - "15672:15672" # Management UI
    networks:
      - recruitment-net

  # Application Services
  discovery-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        JAR_FILE_PATH: backend/discovery-service/target/discovery-service-1.0.0-SNAPSHOT.jar
    container_name: discovery-service
    ports:
      - "8761:8761"
    networks:
      - recruitment-net

  gateway-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        JAR_FILE_PATH: backend/gateway-service/target/gateway-service-1.0.0-SNAPSHOT.jar
    container_name: gateway-service
    ports:
      - "8080:8080"
    depends_on:
      - discovery-service
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - APP_JWT_SECRET=${APP_JWT_SECRET}
    networks:
      - recruitment-net

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        JAR_FILE_PATH: backend/auth-service/target/auth-service-1.0.0-SNAPSHOT.jar
    container_name: auth-service
    depends_on:
      - discovery-service
      - rabbitmq
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SUPABASE_HOST=${SUPABASE_HOST}
      - SUPABASE_PORT=${SUPABASE_PORT}
      - SUPABASE_DB=${SUPABASE_DB}
      - SUPABASE_USERNAME=${SUPABASE_USERNAME}
      - SUPABASE_PASSWORD=${SUPABASE_PASSWORD}
      - SPRING_RABBITMQ_HOST=rabbitmq
      - APP_JWT_SECRET=${APP_JWT_SECRET}
      - GATEWAY_BASE_URL=http://gateway-service:8080
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
    networks:
      - recruitment-net

  company-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        JAR_FILE_PATH: backend/company-service/target/company-service-1.0.0-SNAPSHOT.jar
    container_name: company-service
    depends_on: [discovery-service]
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SUPABASE_HOST=${SUPABASE_HOST}
      - SUPABASE_PORT=${SUPABASE_PORT}
      - SUPABASE_DB=${SUPABASE_DB}
      - SUPABASE_USERNAME=${SUPABASE_USERNAME}
      - SUPABASE_PASSWORD=${SUPABASE_PASSWORD}
      - APP_JWT_SECRET=${APP_JWT_SECRET}
    networks: [recruitment-net]

  user-profile-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        JAR_FILE_PATH: backend/user-profile-service/target/user-profile-service-1.0.0-SNAPSHOT.jar
    container_name: user-profile-service
    depends_on: [discovery-service, rabbitmq]
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SUPABASE_HOST=${SUPABASE_HOST}
      - SUPABASE_PORT=${SUPABASE_PORT}
      - SUPABASE_DB=${SUPABASE_DB}
      - SUPABASE_USERNAME=${SUPABASE_USERNAME}
      - SUPABASE_PASSWORD=${SUPABASE_PASSWORD}
      - SPRING_RABBITMQ_HOST=rabbitmq
      - APP_JWT_SECRET=${APP_JWT_SECRET}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-1.5-pro}
      - CV_FONT_PATH=${CV_FONT_PATH:-/fonts/NotoSans-Regular.ttf}
    volumes:
      - ./backend/user-profile-service/fonts:/fonts:ro
    networks: [recruitment-net]

  job-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        JAR_FILE_PATH: backend/job-service/target/job-service-1.0.0-SNAPSHOT.jar
    container_name: job-service
    depends_on: [discovery-service]
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SUPABASE_HOST=${SUPABASE_HOST}
      - SUPABASE_PORT=${SUPABASE_PORT}
      - SUPABASE_DB=${SUPABASE_DB}
      - SUPABASE_USERNAME=${SUPABASE_USERNAME}
      - SUPABASE_PASSWORD=${SUPABASE_PASSWORD}
      - APP_JWT_SECRET=${APP_JWT_SECRET}
    networks: [recruitment-net]

  application-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        JAR_FILE_PATH: backend/application-service/target/application-service-1.0.0-SNAPSHOT.jar
    container_name: application-service
    depends_on: [discovery-service, rabbitmq]
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SUPABASE_HOST=${SUPABASE_HOST}
      - SUPABASE_PORT=${SUPABASE_PORT}
      - SUPABASE_DB=${SUPABASE_DB}
      - SUPABASE_USERNAME=${SUPABASE_USERNAME}
      - SUPABASE_PASSWORD=${SUPABASE_PASSWORD}
      - SPRING_RABBITMQ_HOST=rabbitmq
      - APP_JWT_SECRET=${APP_JWT_SECRET}
    networks: [recruitment-net]

  interview-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        JAR_FILE_PATH: backend/interview-service/target/interview-service-1.0.0-SNAPSHOT.jar
    container_name: interview-service
    depends_on: [discovery-service, rabbitmq]
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SUPABASE_HOST=${SUPABASE_HOST}
      - SUPABASE_PORT=${SUPABASE_PORT}
      - SUPABASE_DB=${SUPABASE_DB}
      - SUPABASE_USERNAME=${SUPABASE_USERNAME}
      - SUPABASE_PASSWORD=${SUPABASE_PASSWORD}
      - SPRING_RABBITMQ_HOST=rabbitmq
      - APP_JWT_SECRET=${APP_JWT_SECRET}
    networks: [recruitment-net]

  notification-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        JAR_FILE_PATH: backend/notification-service/target/notification-service-1.0.0-SNAPSHOT.jar
    container_name: notification-service
    depends_on: [discovery-service, rabbitmq]
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_RABBITMQ_HOST=rabbitmq
      - MAIL_HOST=${MAIL_HOST}
      - MAIL_PORT=${MAIL_PORT}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
    networks: [recruitment-net]

  file-storage-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        JAR_FILE_PATH: backend/file-storage-service/target/file-storage-service-1.0.0-SNAPSHOT.jar
    container_name: file-storage-service
    depends_on: [discovery-service]
    environment:
      - SUPABASE_PROJECT_URL=${SUPABASE_PROJECT_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_AVATAR_BUCKET=${SUPABASE_AVATAR_BUCKET}
      - SUPABASE_CV_BUCKET=${SUPABASE_CV_BUCKET}
      - SUPABASE_STORAGE_SIGNED_URL_TTL=${SUPABASE_STORAGE_SIGNED_URL_TTL}
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SUPABASE_HOST=${SUPABASE_HOST}
      - SUPABASE_PORT=${SUPABASE_PORT}
      - SUPABASE_DB=${SUPABASE_DB}
      - SUPABASE_USERNAME=${SUPABASE_USERNAME}
      - SUPABASE_PASSWORD=${SUPABASE_PASSWORD}
      - APP_JWT_SECRET=${APP_JWT_SECRET}
    volumes:
      - file_storage_data:/uploads
    networks: [recruitment-net]

  chat-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        JAR_FILE_PATH: backend/chat-service/target/chat-service-1.0.0-SNAPSHOT.jar
    container_name: chat-service
    depends_on:
      - discovery-service
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SUPABASE_HOST=${SUPABASE_HOST}
      - SUPABASE_PORT=${SUPABASE_PORT}
      - SUPABASE_DB=${SUPABASE_DB}
      - SUPABASE_USERNAME=${SUPABASE_USERNAME}
      - SUPABASE_PASSWORD=${SUPABASE_PASSWORD}
      - APP_JWT_SECRET=${APP_JWT_SECRET}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL}
      - GEMINI_BASE=${GEMINI_BASE}
      - GEMINI_TEMPERATURE=${GEMINI_TEMPERATURE}
      - GEMINI_TOP_P=${GEMINI_TOP_P}
      - GEMINI_MAX_TOKENS=${GEMINI_MAX_TOKENS}
      - COMPANY_NAME=${COMPANY_NAME}
      - CAREERS_URL=${CAREERS_URL}
      - CANDIDATE_PORTAL_URL=${CANDIDATE_PORTAL_URL}
      - POLICY_URL=${POLICY_URL}
      - PRIVACY_URL=${PRIVACY_URL}
      - PUBLIC_HR_MAILBOX=${PUBLIC_HR_MAILBOX}
      - CHAT_REQUESTS_PER_MINUTE=${CHAT_REQUESTS_PER_MINUTE}
    networks:
      - recruitment-net

volumes:
  file_storage_data:

networks:
  recruitment-net:
    driver: bridge
